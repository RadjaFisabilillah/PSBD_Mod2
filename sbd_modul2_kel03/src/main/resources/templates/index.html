<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
      integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
      crossorigin="anonymous"
    />
    <title>Mahasiswa</title>
  </head>

  <body
    class="container d-flex flex-column justify-content-center"
    style="min-height: 100vh"
  >
    <h1 class="text-center">Daftar Mahasiswa (Kelompok 03)</h1>

    <div class="d-flex justify-content-between mt-4">
      <a href="/add" class="btn btn-success">Tambah Mahasiswa</a>
      <a href="/trash" class="btn btn-secondary">Lihat Trash (Soft Deleted)</a>
    </div>

    <div class="mt-4">
      <form action="/" method="get" class="form-inline">
        <input
          type="text"
          name="keyword"
          class="form-control mr-sm-2"
          placeholder="Cari Nama atau NIM..."
          th:value="${keyword}"
          style="flex: 1"
        />
        <button type="submit" class="btn btn-outline-primary my-2 my-sm-0">
          Cari
        </button>
        <a href="/" class="btn btn-outline-secondary ml-2">Reset</a>
      </form>
    </div>

    <div class="mt-4">
      <table class="table">
        <thead class="thead-dark">
          <tr>
            <th scope="col">NIM</th>
            <th scope="col">Nama</th>
            <th scope="col">Angkatan</th>
            <th scope="col">Gender</th>
            <th scope="col">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="mhs : ${mahasiswa}">
            <td th:text="${mhs.nim}"></td>
            <td th:text="${mhs.nama}"></td>
            <td th:text="${mhs.angkatan}"></td>
            <td th:text="${mhs.gender}"></td>
            <td>
              <a
                th:href="@{/detail/{nim}(nim=${mhs.nim})}"
                class="btn btn-info btn-sm"
                >Detail</a
              >
              <a
                th:href="@{/edit/{nim}(nim=${mhs.nim})}"
                class="btn btn-primary btn-sm"
                >Edit</a
              >
              <a
                th:href="@{/delete/{nim}(nim=${mhs.nim})}"
                class="btn btn-danger btn-sm"
                onclick="return confirm('Yakin hapus?');"
                >Delete</a
              >
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>
  </body>
</html>
