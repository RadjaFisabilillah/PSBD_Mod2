<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
    />
    <title>Trash - Mahasiswa</title>
  </head>
  <body
    class="container d-flex flex-column justify-content-center"
    style="min-height: 100vh"
  >
    <h1 class="text-center">Data Mahasiswa yang Dihapus (Trash)</h1>
    <a href="/" class="btn btn-primary w-full mt-4">Kembali ke Daftar Utama</a>

    <div class="mt-2">
      <table class="table">
        <thead class="thead-dark">
          <tr>
            <th scope="col">NIM</th>
            <th scope="col">Nama</th>
            <th scope="col">Angkatan</th>
            <th scope="col">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="mhs : ${mahasiswa}">
            <td th:text="${mhs.nim}"></td>
            <td th:text="${mhs.nama}"></td>
            <td th:text="${mhs.angkatan}"></td>
            <td>
              <a
                th:href="@{/restore/{nim}(nim=${mhs.nim})}"
                class="btn btn-info"
                >Restore</a
              >
              <a
                th:href="@{/delete-permanent/{nim}(nim=${mhs.nim})}"
                class="btn btn-danger"
                onclick="return confirm('Hapus permanen data ini?');"
                >Full Delete</a
              >
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(mahasiswa)}">
            <td colspan="4" class="text-center">Tidak ada data di trash.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
