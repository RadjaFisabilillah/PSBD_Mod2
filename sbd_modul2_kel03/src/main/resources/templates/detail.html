<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
    />
    <title>Detail Mahasiswa</title>
  </head>
  <body class="container py-5">
    <h2 class="text-center mb-4">Detail Data Mahasiswa</h2>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title text-primary">Profil Mahasiswa</h5>
        <p><strong>NIM:</strong> <span th:text="${mahasiswa.nim}"></span></p>
        <p><strong>Nama:</strong> <span th:text="${mahasiswa.nama}"></span></p>
        <p>
          <strong>Angkatan:</strong>
          <span th:text="${mahasiswa.angkatan}"></span>
        </p>
        <p>
          <strong>Gender:</strong> <span th:text="${mahasiswa.gender}"></span>
        </p>
      </div>
    </div>

    <h4>Mata Kuliah & IRS yang Diambil</h4>
    <table class="table table-bordered mt-3">
      <thead class="thead-dark">
        <tr>
          <th>Mata Kuliah</th>
          <th>SKS/Keterangan</th>
          <th>Hari</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="irs : ${listIrs}">
          <td th:text="${irs.matkulNama}"></td>
          <td th:text="${irs.irs}"></td>
          <td th:text="${irs.hari}"></td>
          <td>
            <span
              th:class="${irs.status == 'Lulus' ? 'badge badge-success' : 'badge badge-danger'}"
              th:text="${irs.status}"
            ></span>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(listIrs)}">
          <td colspan="4" class="text-center">Belum ada data IRS.</td>
        </tr>
      </tbody>
    </table>

    <a href="/" class="btn btn-secondary mt-3">Kembali ke Daftar</a>
  </body>
</html>
